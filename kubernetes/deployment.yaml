apiVersion: apps/v1
kind: Deployment

metadata:
  name: url-shortener
  namespace: url-shortener

spec:
  replicas: 2

  selector:
    matchLabels:
      app: url-shortener

  template:
    metadata:
      labels:
        app: url-shortener

    spec:
      serviceAccountName: url-shortener-sa
      containers:

      - name: url-shortener

        image: parinati/url-shortener-app:v1

        imagePullPolicy: Always

        ports:

        - containerPort: 5000

        envFrom:

        - configMapRef:
            name: url-shortener-config

        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 5000

          initialDelaySeconds: 10

          periodSeconds: 5

        livenessProbe:

          httpGet:
            path: /
            port: 5000

          initialDelaySeconds: 20

          periodSeconds: 10
